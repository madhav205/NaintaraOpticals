<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Naintara Opticals{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
        }
        {% block extra_style %}{% endblock %}
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <a class="navbar-brand" href="/">👓 Naintara</a>

    <form method="GET" action="/" class="d-flex mx-4 flex-grow-1">
        <input type="text" name="q" class="form-control me-2 rounded-pill" placeholder="Search stylish glasses...">
        <button class="btn btn-light rounded-pill">Search</button>
    </form>

    <div class="d-flex align-items-center gap-2">

        {% if user.is_authenticated %}
            <span class="text-white fw-bold">Hi, {{ user.username }}</span>
            <form action="/logout/" method="POST" class="m-0">
                {% csrf_token %}
                <button class="btn btn-danger btn-sm rounded-pill">Logout</button>
            </form>
        {% else %}
            <a href="/login/" class="btn btn-light btn-sm rounded-pill">Login</a>
            <a href="/signup/" class="btn btn-success btn-sm rounded-pill">Signup</a>
        {% endif %}

        <a href="/cart/" class="btn btn-warning btn-sm rounded-pill">🛒</a>
        <a href="/wishlist/" class="btn btn-outline-light btn-sm rounded-pill">❤️</a>
        <a href="/orders/" class="btn btn-info btn-sm rounded-pill">📦</a>
        <a href="/addresses/" class="btn btn-outline-light btn-sm rounded-pill">📍</a>

    </div>

</nav>

<!-- MESSAGES -->
{% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
