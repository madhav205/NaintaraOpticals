<!DOCTYPE html>

<html>
<head>
    <title>{{ product.name }}</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: #f5f7fa;
        font-family: 'Segoe UI', sans-serif;
    }

    .product-img {
        border-radius: 15px;
        transition: 0.3s;
    }

    .product-img:hover {
        transform: scale(1.05);
    }

    .product-box {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .price {
        color: #16a34a;
        font-size: 28px;
        font-weight: bold;
    }
</style>


</head>

<body>

<div class="container mt-5">


<!-- BACK -->
<a href="/" class="btn btn-outline-dark mb-4 rounded-pill">
    ⬅ Back
</a>

<div class="row g-4">

    <!-- IMAGE -->
    <div class="col-md-6 text-center">
        {% if product.image %}
            <img src="{{ product.image.url }}" 
                 class="img-fluid product-img shadow">
        {% endif %}
    </div>

    <!-- DETAILS -->
    <div class="col-md-6">
        <div class="product-box">

            <h2 class="fw-bold">{{ product.name }}</h2>

            <p class="text-muted">Category: {{ product.category }}</p>

            <p class="price mt-2">₹{{ product.price }}</p>

            <hr>

            <p class="text-muted">
                {{ product.description }}
            </p>

            <!-- BUTTONS -->
            <a href="/add/{{ product.id }}/" 
               class="btn btn-dark w-100 mt-3 rounded-pill">
                Add to Cart 🛒
            </a>

            <a href="/wishlist/add/{{ product.id }}/" 
               class="btn btn-outline-danger w-100 mt-2 rounded-pill">
                ❤️ Add to Wishlist
            </a>

        </div>
    </div>

</div>


</div>

</body>
</html>
